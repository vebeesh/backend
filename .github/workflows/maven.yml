name: Backend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ FIX: give permission
      - name: Give permission to mvnw
        run: chmod +x mvnw

      # ✅ BUILD
      - name: Build with Maven
        run: ./mvnw clean install
